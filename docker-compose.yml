version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: purchases
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: purchase_app
    depends_on:
      - db
    ports:
      - "8080:8080"