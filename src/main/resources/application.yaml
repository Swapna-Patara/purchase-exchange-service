spring:
  application:
    name: purchase

  datasource:
    url: jdbc:postgresql://db:5432/purchases
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

app:
  exchange:
    base-url: https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v1/accounting/od/rates_of_exchange
    page-size: 100
    max-months: 6
    max-iterations: 100 #Safety Limit - to prevent infinite loops in case of API issues

  rest-client:
    connect-timeout: 5000    # Connection timeout in milliseconds (5 seconds)
    read-timeout: 10000      # Read timeout in milliseconds (10 seconds)


springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

